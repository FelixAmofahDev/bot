version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-twi_speech_db}
      POSTGRES_USER: ${DB_USER:-twi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-twi_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./twi_bot/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./twi_bot/migration_add_name.sql:/docker-entrypoint-initdb.d/02-migration.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-twi_user}"]
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-twi_user}:${DB_PASSWORD:-twi_pass}@db:5432/${DB_NAME:-twi_speech_db}?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUDIO_DIR: /app/audio
      TEMP_AUDIO_DIR: /app/temp_audio
      GOOGLE_DRIVE_ENABLED: ${GOOGLE_DRIVE_ENABLED:-false}
      GOOGLE_DRIVE_CREDENTIALS_PATH: ${GOOGLE_DRIVE_CREDENTIALS_PATH:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
    volumes:
      - audio_data:/app/audio
      - temp_audio_data:/app/temp_audio
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-twi_user}:${DB_PASSWORD:-twi_pass}@db:5432/${DB_NAME:-twi_speech_db}?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUDIO_DIR: /app/audio
      TEMP_AUDIO_DIR: /app/temp_audio
      GOOGLE_DRIVE_ENABLED: ${GOOGLE_DRIVE_ENABLED:-false}
      GOOGLE_DRIVE_CREDENTIALS_PATH: ${GOOGLE_DRIVE_CREDENTIALS_PATH:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
    volumes:
      - audio_data:/app/audio
      - temp_audio_data:/app/temp_audio
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "main.py"]

volumes:
  postgres_data:
  audio_data:
  temp_audio_data:

services:
  # FastAPI backend + Telegram bot (both in one container via supervisord)
  - type: web
    name: twi-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AUDIO_DIR
        value: /app/audio
      - key: TEMP_AUDIO_DIR
        value: /app/temp_audio
      - key: GOOGLE_DRIVE_ENABLED
        sync: false
      - key: GOOGLE_DRIVE_CREDENTIALS_PATH
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: PORT
        generateValue: true

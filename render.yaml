services:
  # PostgreSQL Database (Render-managed)
  - type: pserv
    name: twi-db
    plan: free

  # FastAPI backend + baked-in React frontend
  - type: web
    name: twi-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: twi-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AUDIO_DIR
        value: /app/audio
      - key: TEMP_AUDIO_DIR
        value: /app/temp_audio
      - key: GOOGLE_DRIVE_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_CREDENTIALS_PATH
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: PORT
        generateValue: true

  # Telegram bot (background worker)
  - type: worker
    name: twi-bot
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: twi-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AUDIO_DIR
        value: /app/audio
      - key: TEMP_AUDIO_DIR
        value: /app/temp_audio
      - key: GOOGLE_DRIVE_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_CREDENTIALS_PATH
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false

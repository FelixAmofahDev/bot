services:
  # FastAPI backend + baked-in React frontend
  - type: web
    name: twi-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: twi_speech_db
      - key: R2_ENABLED
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        value: twi-audio
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: PORT
        generateValue: true

  # Telegram bot (background worker)
  - type: worker
    name: twi-bot
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    command: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: twi_speech_db
      - key: R2_ENABLED
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        value: twi-audio
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
